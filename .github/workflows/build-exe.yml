name: Generate Windows Installer (.exe)

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: # Allows manual execution from the GitHub Actions tab

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Build Shadow JAR
      shell: bash
      run: |
        chmod +x gradlew
        ./gradlew shadowJar

    - name: Create Installer with jpackage
      run: |
        jpackage `
          --name "KitchenProject" `
          --input build/libs/ `
          --main-jar ProyectoCocina-1.0-all.jar `
          --main-class org.proyectococina.Launcher `
          --type exe `
          --win-shortcut `
          --win-menu `
          --icon src/main/resources/icon.ico

    - name: Upload EXE Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Windows-Installer
        path: "*.exe"