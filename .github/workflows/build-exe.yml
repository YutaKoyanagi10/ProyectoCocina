name: Generate Windows Installer (.exe)

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: # Allows manual execution from the GitHub Actions tab

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Build Shadow JAR
      shell: bash
      run: |
        GRADLEW_PATH=$(find . -name gradlew -type f -printf '%h' -quit)
        cd "$GRADLEW_PATH"
        chmod +x gradlew
        ./gradlew shadowJar

    - name: Create Installer with jpackage
      shell: bash
      run: |
        JAR_PATH=$(find . -name "ProyectoCocina-*-all.jar" -type f -quit)
        JAR_DIR=$(dirname "$JAR_PATH")
        JAR_NAME=$(basename "$JAR_PATH")
        
        jpackage \
          --name "KitchenProject" \
          --input "$JAR_DIR" \
          --main-jar "$JAR_NAME" \
          --main-class org.proyectococina.Launcher \
          --type exe \
          --win-shortcut \
          --win-menu \
          --icon src/main/resources/icon.ico

    - name: Upload EXE Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Windows-Installer
        path: "*.exe"