name: Generate Windows Installer (.exe)

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Build with Gradle
      uses: gradle/gradle-build-action@v3
      with:
        arguments: shadowJar
        build-root-directory: ProyectoCocina

    - name: Create Installer with jpackage
      shell: bash
      run: |
        JAR_PATH=$(find . -name "*all.jar" -type f | head -n 1)
        JAR_DIR=$(dirname "$JAR_PATH")
        JAR_NAME=$(basename "$JAR_PATH")
        
        jpackage \
          --name "Proyecto Cocina" \
          --input "$JAR_DIR" \
          --main-jar "$JAR_NAME" \
          --main-class org.proyectococina.Launcher \
          --type exe \
          --win-shortcut \
          --win-menu \
          --icon src/main/resources/icon.ico

    - name: Upload EXE Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Windows-Installer
        path: "*.exe"