name: Generate Windows Installer (.exe)

on:
  push:
    tags:
      - 'v*' 
  workflow_dispatch:

permissions:
  contents: write 

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: 8.7

    - name: Build Shadow JAR
      run: gradle shadowJar

    - name: Create Installer with jpackage
      shell: bash
      run: |
        JAR_PATH=$(find build/libs -name "*all.jar" -type f | head -n 1)
    
        mkdir -p dist
        cp "$JAR_PATH" dist/
        
        jpackage \
          --name "ProyectoCocina" \
          --input dist \
          --main-jar $(basename "$JAR_PATH") \
          --main-class org.proyectococina.Launcher \
          --type exe \
          --win-shortcut \
          --win-menu \
          --icon "src/main/resources/icon.ico" \
          --dest .
          
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: "*.exe" 
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}