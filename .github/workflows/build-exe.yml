name: Generar Instalador Windows (.exe)

on:
  push:
    branches: [ "main", "master" ] # Se activa al subir cambios a estas ramas

jobs:
  build:
    runs-on: windows-latest # GitHub usará un servidor con Windows

    steps:
    - name: Descargar código
      uses: actions/checkout@v4

    - name: Configurar Java 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Dar permisos al ejecutable de Gradle
      run: chmod +x gradlew
      shell: bash

    - name: Construir Shadow JAR (Fat JAR)
      run: ./gradlew shadowJar

    - name: Crear instalador con jpackage
      run: |
        jpackage `
          --name "ProyectoCocina" `
          --input build/libs/ `
          --main-jar ProyectoCocina-1.0-all.jar `
          --main-class org.proyectococina.Launcher `
          --type exe `
          --win-shortcut `
          --win-menu
          --icon src/main/resources/icon.ico

    - name: Subir el instalador (.exe) como resultado
      uses: actions/upload-artifact@v4
      with:
        name: Instalador-Proyecto-Cocina
        path: "*.exe"