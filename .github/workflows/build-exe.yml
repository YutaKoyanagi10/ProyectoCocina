name: Generate Windows Installer (.exe)

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: 8.7 

    - name: Build Shadow JAR
      shell: bash
      run: |
        gradle shadowJar

    - name: Create Installer with jpackage
      shell: bash
      run: |
        JAR_PATH=$(find . -name "*all.jar" -type f | head -n 1)
        JAR_DIR=$(dirname "$JAR_PATH")
        JAR_NAME=$(basename "$JAR_PATH")
        
        jpackage \
          --name "Proyecto Cocina" \
          --input "$JAR_DIR" \
          --main-jar "$JAR_NAME" \
          --main-class org.proyectococina.Launcher \
          --type exe \
          --win-shortcut \
          --win-menu \
          --icon "src/main/resources/icon.ico"
          
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: "*.exe"
        name: "Release ${{ github.ref_name }}"
        body: "windows installer for version ${{ github.ref_name }}"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}